<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام تسجيل الطلاب</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.container {
    width: 50%;
    margin: auto;
    background: rgb(250, 149, 220);
    padding: 20px;
    border-radius: 10px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
}

button {
    background: green;
    color: palegoldenrod;
    border: none;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

table, th, td {
    border: 1px solid black;
}

th {
    background: #ddd;
}
</style>
</head>
<body>

<div class="container">
<h2>تسجيل طالب</h2>

<form method="POST">
    <input type="text" name="name" placeholder="اسم الطالب" required><br>
    <input type="email" name="email" placeholder="البريد الإلكتروني" required><br>
    <input type="text" name="id" placeholder="رقم الطالب" required><br>
    <input type="text" name="year" placeholder="سنة الدراسة" required><br>
    <input type="text" name="batch" placeholder="اسم الدفعة" required><br>
    <button type="submit">تسجيل</button>
</form>
</div>
</body>
</html>
